; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; ──────────────────────────────────────────────────────────────────────────────
; Shared base settings (inherited by all environments below via `extends = base`)
; ──────────────────────────────────────────────────────────────────────────────
[base]
platform        = ststm32
board           = lora_e5_mini
framework       = arduino
board_build.mcu = stm32wle5jc
monitor_speed   = 115200
lib_deps =
	jgromes/RadioLib@^7.2.0
	stm32duino/STM32duino Low Power@^1.3.0
	paulstoffregen/Time @ ^1.6.1
	stm32duino/STM32duino RTC@^1.6.0
	mikalhart/TinyGPSPlus@^1.1.0
	marzogh/SPIMemory@^3.4.0
monitor_filters =
    colorize
    time

; ──────────────────────────────────────────────────────────────────────────────
; HOW build_src_filter WORKS
; ──────────────────────────────────────────────────────────────────────────────
;  The filter starts from an EMPTY set.
;  +<pattern>  adds   files matching the pattern to the build set
;  -<pattern>  removes files matching the pattern from the build set
;  Patterns are applied left-to-right.
;
;  Firmware envs  →  +<*> starts from ALL src files, then - removes test files
;  Test envs      →  +<file.cpp> adds just that one file (nothing else)
; ──────────────────────────────────────────────────────────────────────────────

; ──────────────────────────────────────────────────────────────────────────────
; Full hardware — all peripherals  (GPS + Flash + IMU + MPR121)
;
; Flash:  pio run -e lora_e5 -t upload
; ──────────────────────────────────────────────────────────────────────────────
[env:lora_e5]
extends          = base
build_src_filter = +<*> -<peripheral_test.cpp> -<gpsTest.cpp>
build_flags =
	-DHAL_RTC_MODULE_ENABLED
	-DHAL_SPI_MODULE_ENABLED
	-DVARIANT_FULL

; ──────────────────────────────────────────────────────────────────────────────
; Variant 1 — No MPR121  (GPS + Flash + IMU only)
;
; Flash:  pio run -e lora_e5_v1 -t upload
; ──────────────────────────────────────────────────────────────────────────────
[env:lora_e5_v1]
extends          = base
build_src_filter = +<*> -<peripheral_test.cpp> -<gpsTest.cpp>
build_flags =
	-DHAL_RTC_MODULE_ENABLED
	-DHAL_SPI_MODULE_ENABLED
	-DVARIANT_V1

; ──────────────────────────────────────────────────────────────────────────────
; Variant 2 — Radio + MPR121 only  (no GPS, no Flash, no IMU)
;
; Flash:  pio run -e lora_e5_v2 -t upload
; ──────────────────────────────────────────────────────────────────────────────
[env:lora_e5_v2]
extends          = base
build_src_filter = +<*> -<peripheral_test.cpp> -<gpsTest.cpp>
build_flags =
	-DHAL_RTC_MODULE_ENABLED
	-DVARIANT_V2

; ──────────────────────────────────────────────────────────────────────────────
; Variant 3 — GPS + Flash only  (no IMU, no MPR121)
;
; Flash:  pio run -e lora_e5_v3 -t upload
; ──────────────────────────────────────────────────────────────────────────────
[env:lora_e5_v3]
extends          = base
build_src_filter = +<*> -<peripheral_test.cpp> -<gpsTest.cpp>
build_flags =
	-DHAL_RTC_MODULE_ENABLED
	-DHAL_SPI_MODULE_ENABLED
	-DVARIANT_V3

; ──────────────────────────────────────────────────────────────────────────────
; Peripheral test — builds ONLY peripheral_test.cpp
;
; Flash:  pio run -e lora_e5_test -t upload
; ──────────────────────────────────────────────────────────────────────────────
[env:lora_e5_test]
extends          = base
build_src_filter = +<peripheral_test.cpp>
build_flags =
	-DHAL_RTC_MODULE_ENABLED
	-DHAL_SPI_MODULE_ENABLED

; ──────────────────────────────────────────────────────────────────────────────
; GPS pass-through test — builds ONLY gpsTest.cpp
;
; Flash:  pio run -e lora_e5_gps_test -t upload
; ──────────────────────────────────────────────────────────────────────────────
[env:lora_e5_gps_test]
extends          = base
build_src_filter = +<gpsTest.cpp>
build_flags =
	-DHAL_RTC_MODULE_ENABLED
	-DHAL_SPI_MODULE_ENABLED
